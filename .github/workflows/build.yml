name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macOS
            artifact: LoopBus-macOS
          - os: windows-latest
            name: Windows
            artifact: LoopBus-Windows

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/LoopBus_artefacts/Release/VST3
          zip -r ${{ github.workspace }}/${{ matrix.artifact }}.zip LoopBus.vst3

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path build/LoopBus_artefacts/Release/VST3/LoopBus.vst3 -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            LoopBus-macOS/LoopBus-macOS.zip
            LoopBus-Windows/LoopBus-Windows.zip
          generate_release_notes: true